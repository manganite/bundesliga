name: Jährlicher Refit

# §5.5: „A summer job runs from the fit procedure and OPENS A PR; it never
# commits directly." Both processes open a PR carrying code, window and
# parameter provenance — no path in this workflow writes to main.
#
# Since the fit extraction the procedure lives in THIS repository
# (`packages/fit`, see docs/FIT_EXTRACTION.md). There is no cross-repo checkout
# and no secret beyond the one GitHub provides.
on:
  schedule:
    # Mid-July, after the previous season is complete and before the new one
    # starts. Deliberately well before the first matchday, so a Process B
    # discussion has room.
    - cron: "0 6 15 7 *"
  workflow_dispatch:
    inputs:
      window:
        description: "Fit-Fenster, z. B. 2012-2026 (Standard: das Fenster aus season-params.json)"
        required: false
      monitor_season:
        description: "Saison, auf der der Amtsinhaber ausgewertet wird (Prozess A)"
        required: false
      folds:
        description: "Zahl der Rolling-Origin-Folds (nur nötig für Prozess B)"
        required: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refit
  cancel-in-progress: false

jobs:
  refit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.23.1"

      # Both halves of the training data are committed since the clubelo
      # permission of 2026-07-23, so a fresh runner has everything it needs and
      # the pre-flight abort that used to sit here is gone. Nothing replaces it:
      # `loadTrainingData` already fails with a TrainingDataError that names the
      # missing half and the path it looked in — a second check in bash would
      # only be a worse copy of that message.
      - name: Fit rechnen
        id: fit
        run: |
          ARGS=""
          [ -n "${{ inputs.window }}" ] && ARGS="$ARGS --window ${{ inputs.window }}"
          [ -n "${{ inputs.monitor_season }}" ] && ARGS="$ARGS --monitor-season ${{ inputs.monitor_season }}"
          [ -n "${{ inputs.folds }}" ] && ARGS="$ARGS --folds ${{ inputs.folds }}"
          node packages/fit/src/cli.mjs $ARGS --out fit-output.json

      - name: Prozess entscheiden und Bericht erzeugen
        id: refit
        run: node pipeline/src/refit/cli.mjs --lab-output fit-output.json --out refit-output

      # Never a direct commit — always a pull request.
      - name: Pull Request öffnen
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="refit/$(date +%Y)-prozess-${{ steps.refit.outputs.process }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          if [ -f refit-output/season-params.json ]; then
            cp refit-output/season-params.json data/season-params.json
            git add data/season-params.json
          fi
          mkdir -p docs/refit
          cp refit-output/pull-request.md "docs/refit/$(date +%Y).md"
          git add docs/refit
          git commit -m "Refit $(date +%Y): Prozess ${{ steps.refit.outputs.process }}"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "Jährlicher Refit $(date +%Y) — Prozess ${{ steps.refit.outputs.process }}" \
            --body-file refit-output/pull-request.md \
            --base main --head "$BRANCH"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: refit-${{ github.run_id }}
          path: |
            refit-output/
            fit-output.json
