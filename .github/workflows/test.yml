name: Tests

# The gate for main. Every push and every pull request runs the full suite —
# deliberately WITHOUT a paths filter, because the deploy workflow's filter is
# scoped to what changes the published site and therefore misses whole areas:
# apps/kicktipp/** (never deployed, but very much tested), docs/**, and the
# workflows themselves. A commit there used to reach main with no CI at all.
#
# The deploy workflow calls this same file as its precondition (`workflow_call`
# below), so there is exactly ONE definition of „die Tests sind grün" — a change
# here changes the deployment gate too, and cannot drift away from it.
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # `github.workflow` is the CALLER's name for a reusable workflow, so the run
  # started by the deploy workflow lands in a different group than the standalone
  # run for the same commit. Sharing one group would let the two cancel each
  # other — and cancelling the deployment's own gate would fail the deployment
  # for no reason.
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pinned Node version (§5.5 dependency hygiene). It must satisfy the
      # engine constraints of the build toolchain's OPTIONAL native bindings:
      # rolldown's linux-x64-gnu binding requires ^20.19.0 || >=22.12.0, and npm
      # silently SKIPS an optional dependency whose engine constraint fails. The
      # render tests build the app's JSX with vite, so they need that binding —
      # a wrong pin here shows up as MODULE_NOT_FOUND far from its cause.
      - uses: actions/setup-node@v4
        with:
          node-version: "22.23.1"
          cache: npm

      - run: npm ci

      # The suite is offline: it runs against committed fixtures and never
      # against the live APIs.
      - name: Tests ausführen
        run: |
          set -o pipefail
          npm test 2>&1 | tee test-output.txt

      # A skipped test is a test that is not protecting anything. The expected
      # number lives in ONE place — expected-skips.json next to this file — so a
      # legitimate change touches a number, never this guard's logic.
      #
      # It is 0 since the clubelo permission of 2026-07-23: the training Elo is
      # committed, so the fit's reproduction gate runs here instead of only on a
      # developer machine.
      - name: Erwartete Zahl übersprungener Tests
        run: |
          EXPECTED=$(node -p "require('./.github/workflows/expected-skips.json').expectedSkips")
          # TAP („# skipped N") in CI, spec („ℹ skipped N") on a local TTY.
          if ! grep -Eq "^(#|ℹ)[[:space:]]*skipped[[:space:]]+$EXPECTED\$" test-output.txt; then
            echo "::error::Die Zahl der übersprungenen Tests ist nicht $EXPECTED."
            echo
            echo "Erwartet werden $EXPECTED Skips (.github/workflows/expected-skips.json)."
            echo "Mehr heißt: irgendwo überspringt ein Test unbemerkt — ein Test, der nichts"
            echo "mehr schützt, sieht in der Zusammenfassung aus wie ein bestandener."
            echo "Weniger heißt: ein bisher übersprungener Test läuft jetzt — dann gehört die"
            echo "Zahl in expected-skips.json angepasst, mit einer Zeile in dessen _history."
            echo
            grep -E '^(#|ℹ)[[:space:]]*(tests|pass|fail|skipped|todo)[[:space:]]' test-output.txt || true
            exit 1
          fi

      # App B is never deployed (§10) and was therefore never built in CI — its
      # tests cover the logic, but a bundling error in the one HTML file would
      # only have shown up on a developer machine.
      #
      # The §9 form decision („eine selbstständige HTML-Datei") is checked as a
      # form: build succeeds, and dist/ holds exactly one file. No size gate and
      # no content heuristics — everything else is already covered by the tests,
      # and a threshold nobody can justify is worse than no threshold.
      - name: App B bauen und die Einzeldatei prüfen
        run: |
          rm -rf apps/kicktipp/dist
          npm run build:kicktipp
          COUNT=$(find apps/kicktipp/dist -type f | wc -l)
          if [ "$COUNT" -ne 1 ]; then
            echo "::error::apps/kicktipp/dist enthält $COUNT Dateien, erwartet ist genau eine."
            echo "App B ist laut §9 eine selbstständige HTML-Datei. Mehrere Dateien heißen,"
            echo "dass etwas nicht mehr eingebettet, sondern daneben gelegt wird."
            find apps/kicktipp/dist -type f
            exit 1
          fi
          if [ ! -f apps/kicktipp/dist/kicktipp.html ]; then
            echo "::error::apps/kicktipp/dist/kicktipp.html fehlt."
            exit 1
          fi
