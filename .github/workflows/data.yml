name: Daten aktualisieren

# The scheduled run is the ONLY data path (§5.1). There is no browser-side live
# fetch: committed files are the single source, so the app can never show a
# state that mixes committed and freshly fetched data.
on:
  schedule:
    # Every two hours. Off-season this simply finds nothing new and commits
    # nothing — which is the intended behaviour, not a fault.
    - cron: "17 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pinned Node version (§5.5 dependency hygiene).
      - uses: actions/setup-node@v4
        with:
          node-version: "22.23.1"

      # The pipeline has no dependencies beyond Node itself, so there is nothing
      # to install and nothing to pin beyond the runtime.
      # Zeitlich begrenzte Brücke (Addendum A §2.6): clubelo führt vier Klubs seit
      # 2026-07-03 nicht fort. 2026-08-14 ist der Tag, an dem die harte 42-Tage-
      # Decke ab effectiveAt ohnehin greift — danach ist der Übertrag unabhängig
      # von dieser Flag unmöglich und der Lauf scheitert wieder fail-closed.
      # Läuft von selbst ab; NICHT verlängern. Wenn clubelo bis ~2026-08-10 die
      # vier Klubs nicht wieder führt, ist eine Eskalation fällig (zweite Mail an
      # den Betreiber, mit Hinweis auf die am 03.07. geschlossenen Reihen).
      #
      # Gemessen und deshalb hier ergänzt: für die beiden BL2-Klubs (Wolfsburg,
      # Kaiserslautern) endet der Übertrag schon am 2026-08-07. Das ist der
      # 1. BL2-Spieltag, und ein bekanntes Spiel in der Lücke hebt das
      # Treppenfunktions-Argument auf. Die Eskalationsfrist ist also Anfang
      # August, nicht Mitte.
      #
      # Die Flag gilt nur hier. Jeder manuelle Aufruf und jeder andere
      # Einstiegspunkt bleibt ohne sie fail-closed.
      - name: Pipeline ausführen
        id: pipeline
        run: node pipeline/src/cli.mjs --data-dir data --carry-forward-until 2026-08-14

      # Commit only on change. A run that found nothing new leaves the
      # repository untouched, so dataUpdatedAt does not move and no deployment
      # is triggered.
      - name: Änderungen committen
        if: steps.pipeline.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "Pipeline meldete eine Änderung, der Baum ist aber unverändert — nichts zu committen."
            exit 0
          fi
          git commit -m "Daten: Saison ${{ steps.pipeline.outputs.season }} aktualisiert"
          git push

# On failure the job simply fails. Nothing is committed and no status field is
# written into the repository — the two contradict, and the app must not derive
# a workflow-health claim from committed data (§5.1). Workflow health is
# monitored exclusively through GitHub Actions failure notifications; make sure
# they are enabled for this repository.
