name: Nach GitHub Pages deployen

# Publishes ONLY apps/public (§10). App B is never deployed and never linked —
# „privat" means „not published as a website", and that is enforced here rather
# than left to discipline.
on:
  push:
    branches: [main]
    paths:
      - "apps/public/**"
      - "packages/**"
      - "pipeline/**"
      - "data/**"
      - "package.json"
      # A lockfile change alone can break the build — it did once, when a new
      # workspace was added without regenerating it and `npm ci` refused.
      - "package-lock.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pinned Node version (§5.5 dependency hygiene). It must satisfy the
      # engine constraints of the build toolchain's OPTIONAL native bindings:
      # rolldown's linux-x64-gnu binding requires ^20.19.0 || >=22.12.0, and npm
      # silently SKIPS an optional dependency whose engine constraint fails —
      # the build then dies with MODULE_NOT_FOUND far from the real cause.
      - uses: actions/setup-node@v4
        with:
          node-version: "22.23.1"
          cache: npm

      - run: npm ci

      # The engine and pipeline tests gate the deployment: a broken ranker or a
      # broken metric must never reach the published site.
      - run: npm test

      # `prebuild` syncs the committed data into the app's public directory.
      # There is no browser-side live fetch — the site serves only what this
      # repository committed (§5.1).
      - run: npm run build --workspace @bundesliga/app

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/public/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
